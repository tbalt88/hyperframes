</script>
    <style>body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: #f2f2f2;
        overflow: hidden;
        font-family: "Helvetica", Arial, sans-serif;
      }

      #main-comp {
        position: relative;
        width: 1920px;
        height: 1080px;
        background-color: #f2f2f2;
      }

      #aroll-frame {
        position: absolute;
        border-radius: 8px;
        z-index: 1;
        transform-origin: center center;
        overflow: hidden;
        background: #000;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      }

      #aroll,
      #aroll-frame > img.__render_frame__,
      #aroll-frame > img.__preview_render_frame__ {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* Modular Grid Lines (Visual Only) */
      .grid-line {
        position: absolute;
        background-color: rgba(26, 26, 26, 0.15);
        z-index: 1;
      }
      .grid-v {
        width: 1px;
        height: 100%;
        top: 0;
      }
      .grid-h {
        height: 1px;
        width: 100%;
        left: 0;
      }

      /* Background Watermark */
      .watermark {
        position: absolute;
        font-size: 600px;
        font-weight: 900;
        color: rgba(26, 26, 26, 0.03);
        z-index: 0;
        white-space: nowrap;
        pointer-events: none;
        left: 5%;
        top: 20%;
      }

      #intro-comp,
      #stats-comp,
      #captions-comp {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #intro-comp {
        z-index: 5;
      }
      #stats-comp {
        z-index: 6;
      }
      #captions-comp {
        z-index: 10;
      }

[data-composition-id="intro"] .container {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 10%; /* Align to 10% grid column */
        font-family: "Helvetica Bold", "Helvetica", Arial, sans-serif;
        font-weight: bold;
      }

      [data-composition-id="intro"] .grid-accent {
        position: absolute;
        left: 10%;
        top: 0;
        width: 8px;
        height: 100%;
